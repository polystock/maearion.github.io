<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메아리온 | 우리 가족의 정직한 보약</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111111;
            color: #f5f5f5;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 720px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 52%;              /* 기존 45% → 52% */
            max-width: 380px;        /* 기존 320px → 380px (더 크게) */
            min-width: 220px;        /* 모바일에서 너무 작아지지 않게 */
            margin-bottom: 55px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .slogan {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 28px;
            color: #ffffff;
        }

        .sub-headline {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #cccccc;
            max-width: 580px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .slogan {
                font-size: 1.85rem;
            }
            
            .sub-headline {
                font-size: 1.05rem;
            }
            
            .logo {
                margin-bottom: 40px;
            }
        }

        @media (max-width: 480px) {
            .slogan {
                font-size: 1.65rem;
            }
            
            .sub-headline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 로고 -->
        <img src="logo.png" alt="메아리온 로고" class="logo">

        <!-- 메인 슬로건 -->
        <h1 class="slogan">
            우리 가족의 정직한 보약 한 숟갈.
        </h1>

        <!-- 서브 헤드라인 -->
        <p class="sub-headline">
            밥은 기본. 가족의 사랑은 정직한 원료와 함량의 보약 한 숟갈을 더 얹는다.
        </p>
    </div>
</body>
</html>
