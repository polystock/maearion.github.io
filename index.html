<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maearion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }
    img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 92%;
      max-height: 85vh;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 60px rgba(255, 120, 120, 0.4));
    }
    @media (max-width: 768px) {
      img {
        max-width: 95%;
        max-height: 80vh;
      }
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="Maearion">
</body>
</html>
